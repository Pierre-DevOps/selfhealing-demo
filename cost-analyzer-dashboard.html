<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Cost Analyzer - Pierre-DevOps Solutions</title>
<style>
  :root {
    --bg-dark: #0a192f;
    --bg-card: #112240;
    --accent-blue: #64ffda;
    --text-primary: #ccd6f6;
    --text-secondary: #8892b0;
    --warning: #ffb86b;
    --danger: #ff6b6b;
    --success: #64ffda;
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: var(--bg-dark);
    color: var(--text-primary);
    line-height: 1.6;
    margin: 0;
    padding: 0;
  }
  header {
    background: var(--bg-card);
    padding: 18px 32px;
    border-bottom: 1px solid rgba(100,255,218,0.15);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand-mark {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent-blue), #3b82f6);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: var(--bg-dark); font-size: 16px;
  }
  .brand-name { font-size: 16px; font-weight: 600; color: var(--text-primary); }
  .brand-sub { font-size: 11px; color: var(--text-secondary); letter-spacing: 0.5px; }
  .page-title { font-size: 13px; color: var(--text-secondary); }
  main { padding: 32px; max-width: 1200px; margin: 0 auto; }
  h1 { font-size: 22px; margin: 0 0 4px 0; color: var(--text-primary); }
  .subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 28px; }
  .summary { display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
  .card {
    background: var(--bg-card);
    border-radius: 10px;
    padding: 18px 26px;
    flex: 1;
    min-width: 140px;
    border: 1px solid rgba(100,255,218,0.08);
  }
  .card .num { font-size: 30px; font-weight: 700; color: var(--text-primary); }
  .card .label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .over .num { color: var(--warning); }
  .under .num { color: var(--danger); }
  .optimal .num { color: var(--success); }
  table { width: 100%; border-collapse: collapse; background: var(--bg-card); border-radius: 10px; overflow: hidden; border: 1px solid rgba(100,255,218,0.08); }
  th, td { padding: 12px 14px; text-align: left; font-size: 13px; border-bottom: 1px solid rgba(100,255,218,0.06); }
  th { background: rgba(10,25,47,0.6); color: var(--text-secondary); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; }
  tr:hover { background: rgba(100,255,218,0.03); }
  .badge { padding: 4px 10px; border-radius: 5px; font-size: 11px; font-weight: 600; }
  .badge-over { background: rgba(255,184,107,0.15); color: var(--warning); }
  .badge-under { background: rgba(255,107,107,0.15); color: var(--danger); }
  .badge-optimal { background: rgba(100,255,218,0.15); color: var(--success); }
  .cmd {
    font-family: 'Consolas', monospace;
    font-size: 11.5px;
    background: rgba(10,25,47,0.7);
    padding: 7px 10px;
    border-radius: 5px;
    color: var(--accent-blue);
    cursor: pointer;
    display: inline-block;
    border: 1px solid rgba(100,255,218,0.1);
    transition: all 0.2s ease;
  }
  .cmd:hover { background: rgba(100,255,218,0.08); border-color: rgba(100,255,218,0.3); }
  .copied { color: #4ade80 !important; }
  .refresh-btn {
    background: linear-gradient(135deg, var(--accent-blue), #3b82f6);
    color: var(--bg-dark);
    border: none;
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 20px;
    transition: opacity 0.2s ease;
  }
  .refresh-btn:hover { opacity: 0.85; }
  .loading { color: var(--text-secondary); padding: 50px; text-align: center; font-size: 13px; }
  .empty-cell { color: var(--text-secondary); }
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="brand-mark">P</div>
    <div>
      <div class="brand-name">Pierre-DevOps Solutions</div>
      <div class="brand-sub">INTEGRATEUR IA &amp; AUTOMATISATIONS POUR PME</div>
    </div>
  </div>
  <div class="page-title">Kubernetes Cost Analyzer</div>
</header>
<main>
  <h1>Audit des workloads</h1>
  <div class="subtitle">Cluster K3s - srv-kubernetes</div>
  <button class="refresh-btn" onclick="loadAudit(true)">Lancer un nouveau scan</button>
  <div id="summary" class="summary"></div>
  <div id="content" class="loading">Chargement...</div>
</main>
<script>
async function loadAudit(triggerScan) {
  document.getElementById('content').innerHTML = '<div class="loading">Chargement...</div>';
  if (triggerScan) {
    await fetch('/scan', { method: 'POST' });
  }
  const res = await fetch('/audit');
  const data = await res.json();
  renderSummary(data.summary, data.total_workloads);
  renderTable(data.workloads);
}

function renderSummary(summary, total) {
  document.getElementById('summary').innerHTML =
    '<div class="card"><div class="num">' + total + '</div><div class="label">Total containers</div></div>' +
    '<div class="card over"><div class="num">' + summary.OVERPROVISIONED + '</div><div class="label">Overprovisioned</div></div>' +
    '<div class="card under"><div class="num">' + summary.UNDERPROVISIONED + '</div><div class="label">Underprovisioned</div></div>' +
    '<div class="card optimal"><div class="num">' + summary.OPTIMAL + '</div><div class="label">Optimal</div></div>';
}

function badgeClass(status) {
  if (status === 'OVERPROVISIONED') return 'badge-over';
  if (status === 'UNDERPROVISIONED') return 'badge-under';
  return 'badge-optimal';
}

function renderTable(workloads) {
  let rows = '';
  for (let i = 0; i < workloads.length; i++) {
    let w = workloads[i];
    let cmdCell = '<span class="empty-cell">-</span>';
    if (w.fix_command) {
      cmdCell = '<span class="cmd" id="cmd-' + i + '" onclick="copyCmd(' + i + ', this)">' + w.fix_command + '</span>';
    }
    rows += '<tr>' +
      '<td>' + w.namespace + '</td>' +
      '<td>' + w.deployment + '</td>' +
      '<td>' + w.container + '</td>' +
      '<td><span class="badge ' + badgeClass(w.status) + '">' + w.status + '</span></td>' +
      '<td>' + w.cpu_used_m + 'm / ' + w.cpu_request_m + 'm</td>' +
      '<td>' + w.ram_used_mi + 'Mi / ' + w.ram_request_mi + 'Mi</td>' +
      '<td>' + cmdCell + '</td>' +
      '</tr>';
  }
  document.getElementById('content').innerHTML =
    '<table><thead><tr>' +
    '<th>Namespace</th><th>Deployment</th><th>Container</th><th>Statut</th>' +
    '<th>CPU (utilise / demande)</th><th>RAM (utilisee / demandee)</th><th>Commande de correction</th>' +
    '</tr></thead><tbody>' + rows + '</tbody></table>';
}

function copyCmd(i, el) {
  const text = el.textContent;
  navigator.clipboard.writeText(text);
  const original = el.textContent;
  el.textContent = 'Copie !';
  el.classList.add('copied');
  setTimeout(function() { el.textContent = original; el.classList.remove('copied'); }, 1200);
}

loadAudit(false);
</script>
</body>
</html>
