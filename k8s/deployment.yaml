apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: selfhealing-demo
  labels:
    app: demo-app
    version: "v1"
  annotations:
    selfhealing: "enabled"
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
        version: "v1"
    spec:
      securityContext:
        runAsNonRoot: false
      containers:
      - name: demo-app
        image: nginx:alpine
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        securityContext:
          allowPrivilegeEscalation: false
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 2
